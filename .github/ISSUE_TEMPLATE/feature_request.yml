name: 功能建议
description: 建议合规、安全且可维护的新能力
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请先描述用户场景，不要只描述某个按钮或实现方式。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: 安全与兼容性影响
      description: 是否涉及凭据、账号权限、邮件副作用、第三方 API 或隐私数据？
    validations:
      required: true
