name: macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    name: build-${{ matrix.asset_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            expected_machine: arm64
            asset_arch: arm64
          - runner: macos-15-intel
            expected_machine: x86_64
            asset_arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      QT_QPA_PLATFORM: offscreen
      QTWEBENGINE_CHROMIUM_FLAGS: --disable-gpu --no-sandbox
      QTWEBENGINE_DISABLE_SANDBOX: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify native runner architecture
        shell: bash
        run: |
          test "$(uname -m)" = "${{ matrix.expected_machine }}"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: >-
          python -m ruff check src tests build.py build_macos.py release.py
          tools/generate_release_signing_key.py
      - name: Test
        run: python -m pytest -q
      - name: Build MailDesk.app
        run: python build_macos.py --clean
      - name: Inspect app bundle and executable signatures
        shell: bash
        run: |
          test -x dist/MailDesk.app/Contents/MacOS/MailDesk
          qt_lib="dist/MailDesk.app/Contents/Frameworks/PySide6/Qt/lib"
          for unused in Qt3DCore QtMultimedia QtPdf QtVirtualKeyboard; do
            test ! -d "$qt_lib/${unused}.framework"
          done
          test ! -d "dist/MailDesk.app/Contents/Frameworks/PySide6/Qt/lib/QtWebEngineCore.framework"
          test ! -f "dist/MailDesk.app/Contents/Frameworks/PySide6/QtWebEngineWidgets.abi3.so"
          file dist/MailDesk.app/Contents/MacOS/MailDesk
          file dist/MailDesk.app/Contents/MacOS/MailDesk | grep -q "${{ matrix.expected_machine }}"
          plutil -lint dist/MailDesk.app/Contents/Info.plist
          # PyInstaller ad-hoc signs collected Mach-O binaries. Confirm that
          # signature metadata exists on the bundle and its entry point.
          codesign --display --verbose=2 dist/MailDesk.app
          codesign --display --verbose=2 dist/MailDesk.app/Contents/MacOS/MailDesk
          du -sh dist/MailDesk.app
      - name: Isolated startup smoke test
        shell: bash
        run: |
          set -euo pipefail
          data_dir="$RUNNER_TEMP/maildesk-data-${{ matrix.asset_arch }}"
          stdout_log="$RUNNER_TEMP/maildesk-${{ matrix.asset_arch }}.stdout.log"
          export MAILDESK_DATA_DIR="$data_dir"
          export MAILDESK_STARTUP_PROBE=reader
          mkdir -p "$data_dir"
          dist/MailDesk.app/Contents/MacOS/MailDesk >"$stdout_log" 2>&1 &
          app_pid=$!
          ready=0
          for _ in $(seq 1 45); do
            if grep -q "MailDesk lightweight reader startup probe passed" "$data_dir/logs/app.log" 2>/dev/null; then
              ready=1
              break
            fi
            if ! kill -0 "$app_pid" 2>/dev/null; then
              cat "$stdout_log"
              find "$data_dir" -type f -print -exec tail -n 80 {} \; || true
              exit 1
            fi
            sleep 1
          done
          if [[ "$ready" != "1" ]]; then
            cat "$stdout_log"
            find "$data_dir" -type f -print -exec tail -n 80 {} \; || true
            kill "$app_pid" 2>/dev/null || true
            exit 1
          fi
          for _ in $(seq 1 20); do
            if ! kill -0 "$app_pid" 2>/dev/null; then
              wait "$app_pid"
              exit 0
            fi
            sleep 0.25
          done
          kill "$app_pid" 2>/dev/null || true
          wait "$app_pid" 2>/dev/null || true
          echo "MailDesk did not quit after the lightweight reader startup probe" >&2
          exit 1
      - name: Package DMG and ZIP
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          base="MailDesk-v${version}-macos-${{ matrix.asset_arch }}"
          output="$GITHUB_WORKSPACE/artifacts/macos"
          stage="$RUNNER_TEMP/$base"
          mkdir -p "$output" "$stage"
          ditto dist/MailDesk.app "$stage/MailDesk.app"
          cp docs/MACOS.md "$stage/MACOS_README.md"
          cp LICENSE THIRD_PARTY_NOTICES.md "$stage/"
          mkdir -p "$stage/licenses"
          cp legal/*.txt "$stage/licenses/"
          python -c "from pathlib import Path; from release import collect_distribution_licenses; collect_distribution_licenses(Path(r'$stage/licenses/python-packages'))"
          ditto -c -k --sequesterRsrc --keepParent "$stage" "$output/${base}.zip"
          ln -s /Applications "$stage/Applications"
          hdiutil create -volname "MailDesk" -srcfolder "$stage" -ov -format UDZO "$output/${base}.dmg"
          du -h "$output/${base}.zip" "$output/${base}.dmg"
          (
            cd "$output"
            shasum -a 256 "${base}.zip" "${base}.dmg" >"SHA256SUMS-${{ matrix.asset_arch }}.txt"
          )
      - name: Verify packaged ZIP with the in-app updater
        shell: bash
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          archive="artifacts/macos/MailDesk-v${version}-macos-${{ matrix.asset_arch }}.zip"
          update_copy="$RUNNER_TEMP/updater-package.zip"
          cp "$archive" "$update_copy"
          PYTHONPATH=src python - "$update_copy" "$version" "${{ matrix.expected_machine }}" <<'PY'
          import hashlib
          import sys
          import tempfile
          from pathlib import Path

          from mailbox_manager.services.update_service import (
              DownloadedUpdate,
              InstallMode,
              ReleaseAsset,
              ReleaseInfo,
              UpdateInfo,
              UpdateService,
          )

          archive = Path(sys.argv[1])
          version = sys.argv[2]
          machine = sys.argv[3]
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          asset = ReleaseAsset(archive.name, "https://github.com/17sho/MailDesk", archive.stat().st_size)
          release = ReleaseInfo(version, f"v{version}", f"MailDesk {version}", "", "", None, (asset,))
          update = UpdateInfo("0.0.0", release, InstallMode.MACOS_APP, asset, None, expected_sha256=digest, expected_size=asset.size)
          with tempfile.TemporaryDirectory(prefix="maildesk-updater-verify-") as temporary:
              service = UpdateService(
                  current_version="0.0.0",
                  updates_dir=Path(temporary) / "updates",
                  install_mode=InstallMode.MACOS_APP,
                  machine=machine,
              )
              staged = service.stage_update(DownloadedUpdate(update, archive, digest))
              assert (staged.source_path / "Contents/MacOS/MailDesk").is_file()
              service.discard_staged_update(staged)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.asset_arch }}
          path: artifacts/macos/*
          if-no-files-found: error
          retention-days: 7
